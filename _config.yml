description: |
  I'm a third-year Computer Science undergraduate at the University of Toronto, working with Prof. [Florian Shkurti](https://www.cs.toronto.edu/~florian/) in the <a href='https://rvl.cs.toronto.edu/'>Robot Vision & Learning Lab</a>. Additionally, I am fortunate to collaborate with <a href='https://linsats.github.io/'>Prof. Lin Shao</a> from the National University of Singapore. 
  
  \
  My research focuses on robotics, computer vision, and machine learning, with a particular interest in enabling robots to perform complex, long-horizon tasks through simple human instructions, such as "make the salad." I’m currently exploring robot generalization and safety across tasks, objects environments, and actions to advance this goal.
